name: CI

on:
  # Docs-only pushes skip CI (no code/deps changed) — saves Actions
  # minutes. A mixed commit (code + docs) still runs. Release commits
  # touch pyproject/lock (not ignored), so pip-audit still gates them.
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  # Weekly full sweep (matrix + e2e + postgres + pip-audit) so version
  # drift and freshly-disclosed CVEs get caught even without a push.
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

# Cancel in-flight runs when a new commit lands on the same ref —
# avoids burning CI minutes on stale PR updates.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Django 5.2 LTS supports Python 3.10-3.14. To save Actions
        # minutes, a plain push to dev tests only 3.13 (what the server
        # runs); the FULL matrix (3.11 floor → 3.14 workstation) runs on
        # pull_request (promotion to main) and the weekly schedule. The
        # hash-locked requirements.lock carries cp311-cp314 wheel hashes,
        # so --require-hashes installs cleanly across the whole matrix.
        python-version: ${{ (github.event_name == 'pull_request' || github.event_name == 'schedule') && fromJSON('["3.11", "3.12", "3.13", "3.14"]') || fromJSON('["3.13"]') }}

    # Sensible default env so the test suite + management commands
    # boot without manual export. Mirrors the minimum the boot
    # guards in settings.py require.
    env:
      DJANGO_SETTINGS_MODULE: ameli_web.settings
      AMELI_APP_SECRET_KEY: ci-secret-key-not-for-production-xxxxxxxxxxxxxxx
      AMELI_APP_ALLOWED_HOSTS: "*"
      # Match the project default so tests that pin the loopback set
      # (test_trusted_proxies_setting_present, test_default_trusts_loopback_only)
      # keep working — overriding to just 127.0.0.1 would mask IPv6.
      AMELI_APP_TRUSTED_PROXIES: "127.0.0.1,::1"
      # ``AMELI_APP_AUDIT_HMAC_KEY`` is intentionally NOT set: leaving
      # it empty makes record_audit write legacy (hmac="") rows during
      # fixture setup, which verify_audit_chain correctly skips. Setting
      # it to a CI-default key would stamp those fixture rows under the
      # CI key, and any test that later flips ``settings.AUDIT_HMAC_KEY``
      # would fail the chain at the pre-existing row.
      AMELI_APP_DEBUG: "false"
      AMELI_APP_SQLITE_PATH: ./ci.sqlite3
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install dependencies
        # ``--require-hashes`` refuses to install any package whose
        # archive does not match a sha256 in the lockfile (ASVS V14.2.3).
        # A typosquat or a rotated wheel on PyPI fails the install
        # instead of silently shipping a malicious payload. The lock
        # files are regenerated with
        # ``pip-compile --generate-hashes --output-file=requirements.lock requirements.txt``
        # (and the corresponding dev variant with ``--allow-unsafe``);
        # see comments in requirements-dev.txt.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Ruff (lint)
        # ``ruff check .`` carries the ``S`` (bandit-like) ruleset
        # enabled in ``pyproject.toml`` — ASVS V10.1.1 + V5.2.8 hard
        # fail the build when a security pattern lands without an
        # explicit ``# noqa: SXXX`` rationale.
        run: ruff check .

      - name: Ruff (format check)
        # Format drift is a warning, not a failure — the project has
        # historic E501 patterns we'd rather catch in code review than
        # block CI on. Remove ``|| true`` once the codebase is fully
        # formatted.
        run: ruff format --check . || true

      - name: Bandit (SAST)
        # ``-ll -ii`` filters to medium+ severity AND medium+ confidence
        # — anything weaker is noise that the ruff S ruleset already
        # surfaces. Bandit + ruff S together is belt-and-braces: a gap
        # in one catalog gets caught by the other.
        run: bandit -r src/ -ll -ii

      - name: Mypy (static type checking)
        # Phase 3 #6 of the 2026-06-20 roadmap. django-stubs plug-in
        # narrows ORM types; per-module overrides in pyproject.toml
        # relax view modules where the @login_required decorator
        # guarantees the runtime invariant mypy cannot see. Floor:
        # zero errors. Tighten by removing per-module disables as
        # the codebase warms up to typing.
        env:
          # mypy needs to import the settings module to load the
          # django plugin; APP_ENV=dev to skip prod boot guards.
          APP_ENV: dev
        run: python -m mypy src/

      - name: Django system checks
        working-directory: src
        run: python -m django check

      - name: Apply migrations (dry-run)
        # ``--check`` exits non-zero when there are migrations that would
        # apply — catches a forgotten ``makemigrations`` in code review.
        working-directory: src
        run: python -m django makemigrations --check --dry-run

      - name: Apply migrations
        working-directory: src
        run: python -m django migrate --noinput

      - name: Pytest with coverage
        # Phase 1 #2 of the 2026-06-20 roadmap. ``coverage run``
        # wraps pytest; ``coverage report`` reads the coverage
        # config from pyproject.toml and exits non-zero when the
        # measured percentage drops below ``fail_under`` (85%).
        # Baseline at the floor's introduction was 86%; a drop
        # means production code lost a test without replacement.
        run: |
          coverage run -m pytest -q --tb=short
          coverage report

  supply-chain-audit:
    name: Supply chain audit (pip-audit)
    runs-on: ubuntu-latest
    # Run only on the canonical branches — PRs from forks get the same
    # signal from the lint-and-test matrix above without spending a
    # second budget on the audit job.
    #
    # Hard-fail since 2026-06-17 (roadmap #15 + #22 closed). The baseline
    # is clean and the operator has a single-screen path forward on a
    # surprise CVE: bump the lower bound of the affected dep in
    # requirements.txt to the first CVE-clean release and re-run.
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit deps (lockfile = what actually ships)
        # ``--strict`` exits non-zero on any vulnerability OR
        # incomplete metadata. We audit the LOCK files (not the
        # source ``.txt`` range files) because the lock is what the
        # deploy installs under ``--require-hashes``; a CVE against a
        # version in the source range that the lock has not adopted
        # would be a false positive against the live deploy.
        run: |
          pip-audit --strict -r requirements.lock
          pip-audit --strict -r requirements-dev.lock

  e2e:
    # Mini-roadmap #12 (2026-06-23). Playwright + chromium drives a
    # headless browser against pytest-django's live_server. Runs on
    # push to dev/main and on PRs — separate from the matrix job so
    # the unit suite stays under 2 min even when the e2e takes
    # longer. The job downloads chromium on every run (no cache);
    # the binary is ~140 MB but the install is fast on GitHub
    # runners (~30 s).
    name: E2E (Playwright + Chromium)
    runs-on: ubuntu-latest
    # Heavy (chromium download); run on PR (promotion) + weekly, not every push.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install dependencies (lockfiles, hash-verified)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Install Chromium for Playwright
        # ``--with-deps`` pulls the OS libs chromium needs (libnss3,
        # libxkbcommon, etc.). On GitHub's ubuntu-latest runner most
        # of these are already present, but the flag makes the
        # invocation idempotent across runner image refreshes.
        run: |
          python -m playwright install chromium --with-deps

      - name: Apply migrations (clean DB for live_server)
        env:
          AMELI_APP_DJANGO_SECRET_KEY: ci-e2e-secret-key
          DJANGO_SETTINGS_MODULE: ameli_web.settings
          # Force SQLite at a writable, predictable path. The runner
          # has no Postgres; pytest-django builds its own ``test_*`` DB
          # in the same dir at suite startup.
          AMELI_APP_SQLITE_PATH: /tmp/ameli-e2e.sqlite3
        working-directory: src
        run: python -m django migrate --noinput

      - name: Pytest (e2e suite only)
        env:
          AMELI_APP_DJANGO_SECRET_KEY: ci-e2e-secret-key
          DJANGO_SETTINGS_MODULE: ameli_web.settings
          AMELI_APP_SQLITE_PATH: /tmp/ameli-e2e.sqlite3
          # pytest-playwright initialises an event loop in the main
          # thread to back its sync API (the python ``page.click()``
          # calls). Django's async-safety check then rejects ORM ops
          # like ``connection.close()`` during ``create_test_db`` with
          # SynchronousOnlyOperation. The escape hatch is documented
          # by Django for exactly this scenario (sync ORM calls from
          # a thread that happens to have a loop in the callstack).
          # Scope is narrow: only applied inside the e2e job, never
          # in the runtime image.
          DJANGO_ALLOW_ASYNC_UNSAFE: "true"
        run: |
          python -m pytest tests/e2e/ -v --tb=short

  js-unit:
    # D-4 (2026-07-02). Unit tests for the pure JS helpers in app.js
    # (password generator, strength evaluator, debounce) using Node's
    # built-in test runner + mock timers — zero npm dependencies, no
    # package.json, no build step. app.js guards its DOM bootstrap on
    # ``typeof document`` so it is ``require``-able under node:test.
    name: JS unit tests (node:test)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        # v6 runs on the node24 action runtime — v4 targeted the
        # deprecated node20 (GitHub forces it onto node24 with a
        # warning). checkout@v5 / setup-python@v6 are already on node24.
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run JS unit tests
        run: node --test tests/js/*.test.js

  test-postgres:
    # TECH_EVOLUTION.md top pick (2026-07-03). The matrix above runs the
    # suite on SQLite, but production is PostgreSQL — and behaviours
    # diverge: ``select_for_update()`` (the throttling gate) is a real row
    # lock on Postgres and a near-no-op on SQLite; transaction / constraint
    # / isolation semantics differ. This job runs the same unit suite
    # against a real Postgres so the gate is exercised the way it ships.
    # One Python version (3.13 = what the dev server runs) is enough — the
    # matrix already covers Python-version spread on SQLite.
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest
    # Postgres service is costly; run on PR (promotion) + weekly, not every
    # push. The SQLite unit suite still runs on every code push (3.13).
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ameli
          POSTGRES_PASSWORD: ameli
          POSTGRES_DB: ameli_ci
        ports:
          - 5432:5432
        # Wait for the container to accept connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U ameli"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: ameli_web.settings
      AMELI_APP_SECRET_KEY: ci-secret-key-not-for-production-xxxxxxxxxxxxxxx
      AMELI_APP_ALLOWED_HOSTS: "*"
      AMELI_APP_TRUSTED_PROXIES: "127.0.0.1,::1"
      AMELI_APP_DEBUG: "false"
      # Selects the Postgres backend (settings/database.py reads
      # ``DATABASE_URL``); when set, the SQLite fallback is not used.
      # pytest-django builds its own ``test_ameli_ci`` DB from migrations.
      DATABASE_URL: "postgresql://ameli:ameli@localhost:5432/ameli_ci"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Migrations apply cleanly on Postgres
        working-directory: src
        run: python -m django migrate --noinput

      - name: Pytest (against Postgres)
        # No coverage gate here — the SQLite matrix owns the coverage floor.
        # This job's job is backend fidelity, not coverage.
        run: pytest -q --tb=short
