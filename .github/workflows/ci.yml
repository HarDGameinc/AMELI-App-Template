name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-flight runs when a new commit lands on the same ref —
# avoids burning CI minutes on stale PR updates.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # Sensible default env so the test suite + management commands
    # boot without manual export. Mirrors the minimum the boot
    # guards in settings.py require.
    env:
      DJANGO_SETTINGS_MODULE: ameli_web.settings
      AMELI_APP_SECRET_KEY: ci-secret-key-not-for-production-xxxxxxxxxxxxxxx
      AMELI_APP_ALLOWED_HOSTS: "*"
      AMELI_APP_TRUSTED_PROXIES: 127.0.0.1
      AMELI_APP_AUDIT_HMAC_KEY: ci-audit-key
      AMELI_APP_DEBUG: "false"
      AMELI_APP_SQLITE_PATH: ./ci.sqlite3
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        # Format drift is a warning, not a failure — the project has
        # historic E501 patterns we'd rather catch in code review than
        # block CI on. Remove ``|| true`` once the codebase is fully
        # formatted.
        run: ruff format --check . || true

      - name: Django system checks
        working-directory: src
        run: python -m django check

      - name: Apply migrations (dry-run)
        # ``--check`` exits non-zero when there are migrations that would
        # apply — catches a forgotten ``makemigrations`` in code review.
        working-directory: src
        run: python -m django makemigrations --check --dry-run

      - name: Apply migrations
        working-directory: src
        run: python -m django migrate --noinput

      - name: Pytest
        run: pytest -q --tb=short
