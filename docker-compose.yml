# Development compose stack.
#
#   docker compose up         — api + notifier + postgres
#   docker compose run --rm api pytest     — run the suite in-container
#   docker compose exec api ameli-app verify-audit
#
# This is intentionally NOT a production manifest — no TLS termination,
# no resource limits, the SECRET_KEY is a placeholder, and the
# admin bootstrap step is left to the operator. For prod refer to
# ``scripts/install.sh`` + the systemd profile.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ameli
      POSTGRES_USER: ameli
      POSTGRES_PASSWORD: ameli_dev_only
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ameli -d ameli"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      # ``dev`` target = runtime image + dev-deps (pytest et al.) so
      # ``docker compose run --rm api pytest`` works. A prod build uses
      # ``--target runtime`` for a lean image without the test toolchain.
      target: dev
    image: ameli-app-template:dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: ameli_web.settings
      # APP_ENV=dev relaxes the prod boot guards (SECRET_KEY/DEBUG/hosts,
      # MFA key). app.yaml.example already sets environment: dev, but pin
      # it here too so the stack does not depend on file discovery order.
      APP_ENV: dev
      # The code reads the AMELI_APP_DJANGO_* names (config.py, base.py);
      # the un-prefixed forms are inert and silently fall back to the
      # insecure default SECRET_KEY + DEBUG=False.
      AMELI_APP_DJANGO_SECRET_KEY: dev-secret-key-do-not-use-in-prod-xxxxxxxxxxxx
      AMELI_APP_DJANGO_ALLOWED_HOSTS: "*"
      AMELI_APP_DJANGO_DEBUG: "true"
      # Dev-only Fernet key (required outside dev; harmless placeholder here
      # so TOTP enrol/decrypt works if the stack is run with APP_ENV!=dev).
      AMELI_APP_MFA_ENCRYPTION_KEY: vhviIz7_eX7DP2palWYXf7sr6837UcAhTiLVbk9Rwuk=
      AMELI_APP_TRUSTED_PROXIES: "127.0.0.1"
      AMELI_APP_AUDIT_HMAC_KEY: dev-audit-key
      DATABASE_URL: postgres://ameli:ameli_dev_only@db:5432/ameli
      AMELI_APP_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    ports:
      - "18080:18080"
    volumes:
      # Hot-reload source in dev. Bind-mount excludes the venv and
      # the compiled assets so we don't shadow the image's installed
      # site-packages.
      - ./src:/app/src:cached
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:18080/health\").read()' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    command: ["python", "-m", "uvicorn", "ameli_web.asgi:application",
              "--host", "0.0.0.0", "--port", "18080", "--reload"]

  notifier:
    image: ameli-app-template:dev
    depends_on:
      api:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: ameli_web.settings
      APP_ENV: dev
      AMELI_APP_DJANGO_SECRET_KEY: dev-secret-key-do-not-use-in-prod-xxxxxxxxxxxx
      AMELI_APP_DJANGO_ALLOWED_HOSTS: "*"
      AMELI_APP_MFA_ENCRYPTION_KEY: vhviIz7_eX7DP2palWYXf7sr6837UcAhTiLVbk9Rwuk=
      AMELI_APP_TRUSTED_PROXIES: "127.0.0.1"
      AMELI_APP_AUDIT_HMAC_KEY: dev-audit-key
      DATABASE_URL: postgres://ameli:ameli_dev_only@db:5432/ameli
      AMELI_APP_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      AMELI_APP_NOTIFIER_INTERVAL: "30"
    command: ["sh", "-c",
              "while true; do python -m ameli_app.cli notify-once || true; sleep ${AMELI_APP_NOTIFIER_INTERVAL:-30}; done"]

volumes:
  db-data:
